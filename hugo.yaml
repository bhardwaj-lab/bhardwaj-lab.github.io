params:
  author: Bhardwaj Lab
  authorimage: images/global/bhardwajlab_logo.svg
  moto: "Quantitative Biology and Data Integration"
  linktext: Institute of Biodynamics and Biocomplexity, Utrecht University
  link: https://www.uu.nl/en/organisation/institute-of-biodynamics-and-biocomplexity
  headimage: images/pages/multiUMAP_web.png
  disable_theme_toggle: false
  disable_stay_uptodate: false

  p1:
    heading: "Our mission"
    image: "images/pages/web_slides_p1.png"
    content:
      - text: "Our lab’s ultimate goal is to transform human medicine by learning how to program stem cells directly inside the body. If we can guide these master cells to become specific, functional cell types, we can unlock powerful new therapies for regenerative medicine, healthy aging, and cancer."
      - text: "To achieve this, we study how cells make 'fate decisions'. Even though every cell in our body shares the same DNA code, they develop unique identities during embryonic development. They do this by modifying their epigenetic landscape—a molecular scaffolding that determines which genes are turned on or off. This process is tightly controlled by regulatory proteins called 'transcription factors' working within the cell's 'chromatin' environment (the structural way DNA is packaged)."
      - text: "By mapping the precise, dose-response relationships between these epigenetic factors and cellular choices, we can learn how to efficiently rewrite a cell's identity."
    links:
      - text: Learn more about epigenetic reprogramming
        url: "posts/references/"

  p2:
    heading: "Our approach"
    image: "images/pages/web_slides_p2.png"
    content:
      - text: "In recent years, technology has been developed to systematically map the chromatin landscape of individual cells, and quantify the levels of transcription factors. This allows us to build data-driven models that explain the role of these key players in cellular decision-making."
      - text: "In our research group, we apply such technology (specifically, single-cell and single-molecule genomics methods) to understand cellular decision-making. These experiments generate massive, complex datasets, typically measuring thousands of genes within thousands (and sometimes millions) of individual cells or molecules. We use this data to build statistical and machine learning models that can uncover the relationship between these regulators and a the cell's current or future state."
    links:
      - text: Learn more about our technologies
        url: "#"

  p3:
    heading: "Our Projects"
    content:
      - text: "We take a data-driven approach to biology, splitting our focus between two major pillars:"
      - text: "Discovery: understanding cellular decision-making by extracting new insights from epigenomics and multi-omics data."
      - text: "Engineering: building new bioinformatic methods and tools to analyse the data from such emerging technologies, and making them accessible to biologists. "
    links:
      - text: Learn more about our projects
        url: "posts/feb24_kickstart"
    image: "images/pages/vblab_projects.png"
    logos:
      - identifier: a
        image: "images/global/sample-logo.svg"
        alt: "a"
      - identifier: b
  p4:
    heading: "News"
    maxposts: 3
    content:
      - text: "Latest developments from our lab"
  p5:
    heading: "Stay Up to Date"
    content:
      - text: "Subscribe to our lab updates/open positions"
    action: "https://formsubmit.co/3a6fe8a418a1fbfb7903d5859ca739da"
    label: "Email address"
    placeholder: "Enter your email"
    button: "Notify me"

  social_media:
    github:
      enabled: true
      url: 'https://github.com/bhardwaj-lab'
    twitter:
      enabled: false
      url: 'https://twitter.com/vivekbhr'
    google_scholar:
      enabled: true
      url: 'https://scholar.google.com/citations?user=gDipTycAAAAJ&hl=en'
    University:
      enabled: true
      name: Utrecht University
      url: 'https://www.uu.nl/en/'


